<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            width: 1000px;
            height: 900px;
            margin: 5px;
            background-color: rgb(255, 246, 251);
            box-sizing: border-box;
            box-shadow: 2px 2px 5px rgb(188, 158, 163);
            /* float: left; */
        }
        #leftbar{
            width: 300px;
            height: 900px;
            padding-top: 100px;
            background-color: rgb(255, 191, 200);
            box-sizing: border-box;
            box-shadow: 2px 2px 5px rgb(223, 198, 202);
        }
        #imgbox{
            width: 200px;
            height: 200px;
            margin: 10px auto;
            border: 2px solid white;
            background-image: url("코리락쿠마.jpg");
            box-sizing: border-box;
            background-size: cover;
            border-radius: 50%;
        }
        #textname{
            font-size: 32px; 
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px gray;
            text-align: center;
            margin-top: 200px;
        }
        #cathpride{
            text-align: center;
            color: white;
            font-weight: bold;
            padding-top: 8px;
            padding-bottom: 8px;
        }
        .subtext{
            text-align: center;
            padding: 5px;
        }
        #button{
            width: 180px;
            height: 50px;
            padding-left: 10px;
            margin-left: 13px;
            font-size: 15px;
            background-color: #fff1ca;
            border-radius: 50px;
            border: 1px solid white;
        }
        #button:hover{
            background-color: #d7cbaa;
            box-shadow: 2px 2px 2px gray;
        }
        #maincontents{
            width: 630px;
            height: 810px;
            padding: 10px;
            position: relative;
            bottom: 900px;
            border: 1px solid #fff1ca;
            background-color: #fff1ca;
            border-radius: 20px;
            box-sizing: border-box;
            margin: 30px 0px 30px 330px
        }
            /* #mainbox1{
            width: 630px;
            height: 150x;
            padding: 10px;
            border: 1px solid #fff1ca;
            background-color: #fff1ca;
            border-radius: 20px;
            float: left;
            margin: 30px 0px 0px 330px
        } */
        .maintitle{
           font-size: 20px;
           font-weight: bold;
           padding-left: 30px;
        }
        

    </style>
</head>
<body>
    <div id="container">
        <div id="leftbar">
            <div id="imgbox">
            <div id="textname">Hyejin Ahn</div>
            <div id="cathpride">하는 만큼 보인다!</div>
            <hr id="line">
            <br>
            <div class="subtext">🏡 Incheon, Korea</div>
            <div class="subtext">📫 elotoll@naver.com</div>
            <br>
            <button id="button">🎁프로젝트 보러가기🎁</button>
            </div>
        </div>
        <div id="maincontents">
            <div class="maintitle">소개글</div>
            <ul>
            <li>저는 이런 사람입니다. 어쩌고 블라블라블라</li>
            <li>이런 성향의 사람이고요. 짱짱 좋은 설명글</li>
            </ul>
            <div class="mainbox2">
            </div>
        </div>
    </div>
    
</body>
</html>
